# =============================================================================
# Nginx configuration for FinTrack React SPA
#
# Two key responsibilities:
#
# 1. API REVERSE PROXY
#    Requests to /api/v1/... are proxied to the backend container.
#    This means the browser always talks to port 80 — no CORS needed.
#    Without this, the browser would call http://localhost:8080 (different port)
#    and the browser's Same-Origin Policy would block it.
#
# 2. SPA ROUTING
#    React Router handles routing client-side: /expenses, /dashboard, /login, etc.
#    These are NOT real files on disk. When the browser navigates directly to
#    http://localhost/expenses, Nginx can't find a file called 'expenses'.
#    The try_files → /index.html fallback serves index.html instead,
#    and React Router takes over and renders the correct page.
#    Without this, direct navigation or page refresh shows "404 Not Found".
# =============================================================================

server {
    listen 80;
    server_name _;           # Accept any hostname

    root /usr/share/nginx/html;
    index index.html;

    # ─── Compression ──────────────────────────────────────────────────────────
    # Gzip reduces transfer size by 60-80% for text content.
    # gzip_vary: tells proxies/CDNs to cache both compressed and uncompressed.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;    # Don't compress tiny responses (overhead > benefit)
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    # ─── API Reverse Proxy ────────────────────────────────────────────────────
    # All requests starting with /api/ are forwarded to the Spring Boot backend.
    # 'backend' is the Docker Compose service name — Docker's internal DNS resolves it.
    #
    # proxy_pass http://backend:8080;
    #   No trailing slash → Nginx preserves the full URI.
    #   /api/v1/expenses → http://backend:8080/api/v1/expenses ✓
    #   (With trailing slash: /api/v1/expenses → http://backend:8080/v1/expenses ✗)
    #
    # X-Forwarded-* headers: tell the backend the client's real IP and protocol.
    # Without these, the backend sees all requests as coming from 172.x.x.x (Nginx).
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts: connect in 10s, wait up to 60s for backend response.
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # Buffer: Nginx holds the full backend response before sending to client.
        # Improves performance for slow clients (mobile, poor connection).
        proxy_buffering    on;
        proxy_buffer_size  4k;
    }

    # ─── Static Assets (Vite content-hashed filenames) ────────────────────────
    # Vite's build output looks like: /assets/index.a1b2c3d4.js
    # The filename changes whenever content changes → safe to cache forever.
    # 'immutable' tells browsers: don't even revalidate, the content will never change.
    #
    # access_log off: no point logging cache hits for static files.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # ─── SPA Fallback ─────────────────────────────────────────────────────────
    # try_files: try to serve the file, then directory, then fall back to index.html.
    # This is what makes client-side routing work.
    #
    # Cache-Control: no-cache for index.html.
    #   index.html itself is tiny and rarely cached. Its <script src> tags reference
    #   the content-hashed assets above. When you deploy a new version, the new
    #   index.html references new hashed filenames → browser auto-downloads new assets.
    #   If index.html were cached, users would get old JS/CSS pointed to by old index.html.
    #
    # Security headers:
    #   X-Frame-Options: prevent clickjacking (don't allow embedding in iframes)
    #   X-Content-Type-Options: prevent MIME sniffing
    #   Referrer-Policy: don't leak full URL in Referer header to third parties
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control      "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options    "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options "nosniff"                       always;
        add_header Referrer-Policy    "strict-origin-when-cross-origin"   always;
    }
}
